# Project override: the stock probatum preset runs ./probatum.yaml, which in
# THIS repo needs the host toolchain (cargo, python3) — that suite runs
# natively in .github/workflows/ci.yml. In-container we run the image
# selfcheck instead: it proves the shipped image can run checks at all.
[presets.probatum]
name = "probatum"
phase = "test"
image = "ghcr.io/probatum-org/probatum:0.1.0"
command = "run .probatum/selfcheck.yaml"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
# (rustfmt override removed: fixed upstream in cidx 2.1.0 — cidx-org/cidx#163;
# the CI bootstrap is pinned to the 2.1.0 commit until cidx-org/cidx#187 makes
# v2 tags reachable by `go install`.)
