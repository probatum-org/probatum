# Project override: the stock probatum preset runs ./probatum.yaml, which in
# THIS repo needs the host toolchain (cargo, python3) — that suite runs
# natively in .github/workflows/ci.yml. In-container we run the image
# selfcheck instead: it proves the shipped image can run checks at all.
[presets.probatum]
name = "probatum"
phase = "test"
image = "ghcr.io/probatum-org/probatum:0.1.0"
command = "run .probatum/selfcheck.yaml"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

# rustfmt override: the released cidx preset runs `cargo fmt` without adding
# the rustup component first, which fails on rust image variants where
# cargo-fmt is a rustup proxy. Add the component explicitly (idempotent).
[presets.rustfmt]
name = "rustfmt"
phase = "code"
image = "rust:1.95.0"
command = "sh -c 'rustup component add rustfmt >/dev/null 2>&1; cargo fmt -- --check'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
