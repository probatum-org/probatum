# CIDX Configuration
# Auto-detected: Rust project
#
# Edit to match your needs. Run 'cidx preset list' for all available tools.
# Run 'cidx validate' to check, 'cidx run ci' to execute.

# cargo-audit back since cidx 2.1.0: the preset now downloads the prebuilt
# release binary (cidx-org/cidx#161).
[security]
containers = ["trivy", "gitleaks", "cargo-audit"]

[code]
containers = ["clippy", "rustfmt"]

[test]
containers = ["cargo-test", "probatum"]

[build]
containers = ["cargo-build"]

[pipelines.ci]
phases = ["security", "code", "test", "build"]

[pipelines.pr]
phases = ["security", "code", "test"]
